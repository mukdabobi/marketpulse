<!DOCTYPE html>
<html lang="ko">
<head>

<title>MarketPulse v8</title>
<script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
<script src="https://unpkg.com/recharts@2.5.0/umd/Recharts.js" crossorigin></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:auto}body{background:#060a12;color:#dde6f5;font-family:-apple-system,sans-serif;min-height:100vh;overflow-x:hidden;overflow-anchor:none}
input{background:#111b2e;border:1px solid #182236;color:#dde6f5;border-radius:4px;padding:8px 10px;font-size:13px;width:100%;font-family:inherit}
button{cursor:pointer;border:none;font-family:inherit;transition:opacity .15s}
button:hover{opacity:.86}button:active{opacity:.65}
@keyframes glow{0%,100%{box-shadow:0 0 8px rgba(16,208,144,.2)}50%{box-shadow:0 0 20px rgba(16,208,144,.5)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
@keyframes stalePulse{0%,100%{box-shadow:0 2px 12px rgba(240,64,96,.3)}50%{box-shadow:0 2px 24px rgba(240,64,96,.8)}}
.glow{animation:glow 3s infinite}
.puls{animation:pulse 2s infinite}
.stale{animation:stalePulse 2s infinite}
::-webkit-scrollbar{width:3px}::-webkit-scrollbar-thumb{background:#182236}
</style>
</head>
<body>
<div id="root" style="display:flex;align-items:center;justify-content:center;height:100vh;flex-direction:column;gap:14px">
  <div style="font-size:26px;font-weight:900;letter-spacing:.2em;color:#10d090">MARKET<span style="color:#dde6f5">PULSE</span></div>
  <div style="color:#5e6f8a;font-size:12px">초기화 중...</div>
</div>
<script>
// ── 상수 ──
const C={bg:"#060a12",bg2:"#0c1422",bg3:"#111b2e",bg4:"#182236",t1:"#dde6f5",t2:"#5e6f8a",t3:"#283348"};
const h=React.createElement;
const AVG=5925;
const DEF={sp500:6529,cpi:2.7,cpiPrev:2.5,yc:0.08,rate10:4.34,hy:3.5,hyPrev:3.2,nfp:14,ur:4.2,urPrev:4.1,eps:13.0,pmi:49.5,wti:102,vix:28.9,fg:22,rsiW:42.6,macdH:-16.98,macdHPrev:-19.0,pe:19.4,fwdEps:320,cape:35.5,macdDiv:false,rsiDiv:false,headline:"트럼프 이란 공격 10일 중단 — S&P 6,529 반등, WTI $102 유지",updatedAt:"기본값 (📡 버튼으로 갱신)",news:[{time:"오늘",title:"트럼프 이란 공격 10일 일시 중단 — S&P +2.91%",tag:"🔑",col:"#10d090"},{time:"오늘",title:"WTI $102 — 이란 유조선 피격, 호르무즈 봉쇄 우려",tag:"🛢",col:"#f04060"},{time:"어제",title:"파월 '유가 공급충격은 연준 통제 불가'",tag:"📊",col:"#f0a030"}]};

// ── 모델 ──
const getQuad=(cc,hc)=>cc>=0&&hc<0?{key:"A",cond:"CPI↑+HY축소",upProb:91,color:"#f04060"}:cc<0&&hc<0?{key:"B",cond:"CPI↓+HY축소",upProb:87,color:"#10d090"}:cc<0&&hc>=0?{key:"C",cond:"CPI↓+HY확대",upProb:69,color:"#40a8f0"}:{key:"D",cond:"CPI↑+HY확대",upProb:33,color:"#94a3b8"};
const sig=x=>1/(1+Math.exp(-x));
const lp=(cpi,yc,hy,eps)=>sig(1.18-.387*(cpi-2.96)/2.77-.256*(yc-.96)/1.05+.543*(hy-5.28)/2.39+.3*(eps-8.83)/24.5);
const NFPM={hot:{down:{emoji:"🟡",label:"과열 주의",color:"#f59e0b",upProb:58},up:{emoji:"🔴",label:"스태그",color:"#dc2626",upProb:38}},gold:{down:{emoji:"🟢",label:"골디락스",color:"#10d090",upProb:82},up:{emoji:"🟡",label:"혼조",color:"#f59e0b",upProb:61}},miss:{down:{emoji:"🔵",label:"역발상",color:"#40a8f0",upProb:79},up:{emoji:"⚫",label:"침체 우려",color:"#94a3b8",upProb:42}}};
const getCombo=(nfp,uc)=>NFPM[nfp>25?"hot":nfp>=15?"gold":"miss"][uc<=0?"down":"up"];
const calcEns=(qp,lp2,cp)=>{const s=Math.round(qp*.5+lp2*100*.3+cp*.2);if(s>=80)return{score:s,label:"강력 매수",color:"#10d090",emoji:"🟢",action:"DCA 다음 단계 실행"};if(s>=68)return{score:s,label:"적극 매수",color:"#3b82f6",emoji:"🔵",action:"트리거 재확인 후 실행"};if(s>=55)return{score:s,label:"조건부 매수",color:"#f0a030",emoji:"🟡",action:"트리거 대기"};if(s>=40)return{score:s,label:"중 립",color:"#94a3b8",emoji:"⚪",action:"관망"};return{score:s,label:"방어 대기",color:"#f04060",emoji:"🔴",action:"현금 유지"};};
const predictCPI=(w,c)=>Math.max(0,Math.round((.038*w+.41*c-.6)*10)/10);
const calcBand=(eps,rate)=>{const fp=Math.min(30,Math.max(12,100/(rate+1.5)));return{fairPE:Math.round(fp*10)/10,fairVal:Math.round(fp*eps),b14:Math.round(14*eps),b18:Math.round(18*eps),b22:Math.round(22*eps),b26:Math.round(26*eps),b30:Math.round(30*eps)};};
const detectReg=(d,erp,cape)=>{let s=0;if(erp>2)s+=3;else if(erp>1)s+=1;if((d.hy||3.5)<3.5)s+=2;else if((d.hy||3.5)<5)s+=1;if((d.rsiW||42)>50)s+=1;if((d.eps||13)>10)s+=1;if((d.cpi||2.7)<2.5)s+=1;if(erp<0)s-=4;if((d.hy||3.5)>6)s-=3;if(cape>38)s-=2;else if(cape>33)s-=1;if((d.vix||29)>30)s-=2;if((d.cpi||2.7)>3.5)s-=2;if(s>=4)return{label:"강세장",color:"#10d090",emoji:"🟢",score:s};if(s>=1)return{label:"완만한 강세",color:"#3b82f6",emoji:"🔵",score:s};if(s>=-1)return{label:"전환 구간",color:"#f0a030",emoji:"🟡",score:s};return{label:"약세 경계",color:"#f04060",emoji:"🔴",score:s};};

// ── 실시간 API ──
async function fetchLive(){
  // Yahoo Finance v7 quote API + CORS 프록시 fallback
  const SYMS={"sp500":"^GSPC","vix":"^VIX","wti":"CL=F","rate10":"^TNX"};
  const symList=Object.values(SYMS).join(",");

  // 방법1: Yahoo Finance v7 직접
  const tryDirect=async()=>{
    const url=`https://query1.finance.yahoo.com/v7/finance/quote?symbols=${encodeURIComponent(symList)}&fields=regularMarketPrice`;
    const r=await fetch(url,{signal:AbortSignal.timeout(6000),headers:{"Accept":"application/json"}});
    if(!r.ok)throw new Error(r.status);
    const j=await r.json();
    return j?.quoteResponse?.result||[];
  };

  // 방법2: allorigins 프록시
  const tryProxy=async(proxyBase)=>{
    const target=`https://query1.finance.yahoo.com/v7/finance/quote?symbols=${encodeURIComponent(symList)}`;
    const url=`${proxyBase}${encodeURIComponent(target)}`;
    const r=await fetch(url,{signal:AbortSignal.timeout(8000)});
    if(!r.ok)throw new Error(r.status);
    const raw=await r.json();
    const text=raw.contents||raw;
    const j=typeof text==="string"?JSON.parse(text):text;
    return j?.quoteResponse?.result||[];
  };

  let results=[];
  try{results=await tryDirect();}catch(e1){
    try{results=await tryProxy("https://api.allorigins.win/raw?url=");}catch(e2){
      try{results=await tryProxy("https://corsproxy.io/?url=");}catch(e3){
        throw new Error("모든 API 차단됨 — ✏️ 수동입력을 사용하세요");
      }
    }
  }

  const out={};
  const keyMap={"^GSPC":"sp500","^VIX":"vix","CL=F":"wti","^TNX":"rate10"};
  results.forEach(r=>{
    const k=keyMap[r.symbol];const p=r.regularMarketPrice;
    if(k&&p!=null){
      if(k==="sp500")out.sp500=Math.round(p);
      else if(k==="vix")out.vix=+p.toFixed(1);
      else if(k==="wti")out.wti=Math.round(p);
      else if(k==="rate10")out.rate10=+p.toFixed(2);
    }
  });
  if(!Object.keys(out).length)throw new Error("데이터 파싱 실패 — ✏️ 수동입력을 사용하세요");
  return out;
}

// ── 헬퍼 ──
const box=(children,style={})=>h("div",{style:{...style}},children);
const txt=(t,style={})=>h("span",{style},t);
const btn=(label,onClick,style={})=>h("button",{onClick,style},label);

// ── 메인 앱 ──
function App(){
  const [d,setD]=React.useState(DEF);
  const [tab,setTab]=React.useState("today");
  const [loading,setLoading]=React.useState(false);
  const [loadingAI,setLoadingAI]=React.useState(false);
  const [err,setErr]=React.useState(null);
  const [liveTs,setLiveTs]=React.useState(null);
  const [showMi,setShowMi]=React.useState(false);
  const [mi,setMi]=React.useState({sp500:"",wti:"",vix:"",rate10:""});

  // 계산
  const cc=(d.cpi||2.7)-(d.cpiPrev||2.5),hc=(d.hy||3.5)-(d.hyPrev||3.2),uc=(d.ur||4.2)-(d.urPrev||4.1);
  const quad=getQuad(cc,hc),combo=getCombo(d.nfp||14,uc);
  const LP=lp(d.cpi||2.7,d.yc||.08,d.hy||3.5,d.eps||13);
  const ens=calcEns(quad.upProb,LP,combo.upProb);
  const sp=d.sp500||6529,pct=(sp/AVG-1)*100;
  const qc=quad.key==="D"?"#94a3b8":quad.color;
  const PE=d.pe||19.4,CAPE=d.cape||35.5,EY=+(100/PE).toFixed(2);
  const ERP=+(EY-(d.rate10||4.34)).toFixed(2),realERP=+(EY-(d.cpi||2.7)).toFixed(2);
  const reg=detectReg(d,ERP,CAPE);
  const ea=ERP>3?8:ERP>1.5?4:ERP>0?0:ERP>-1?-8:-16;
  const ca=CAPE<25?6:CAPE<30?2:CAPE<33?0:CAPE<38?-5:-12;
  const ra=reg.score>=4?6:reg.score>=1?3:reg.score>=-1?0:-6;
  const intS=Math.max(0,Math.min(100,ens.score+ea+ca+ra));
  const CMAP={"strong-cheap":{v:"🟢🟢 최강 수렴",a:"적극 집행",c:"#10d090"},"strong-fair":{v:"🟢 수렴",a:"분할 집행",c:"#3b82f6"},"strong-rich":{v:"🟡 부분 수렴",a:"소극 집행",c:"#f0a030"},"mid-cheap":{v:"🟢 부분 수렴",a:"트리거 대기",c:"#3b82f6"},"mid-fair":{v:"🟡 혼재",a:"관망+DCA",c:"#f0a030"},"mid-rich":{v:"🟠 발산",a:"관망 권장",c:"#f59e0b"},"weak-cheap":{v:"🔵 역발상",a:"다이버전스 대기",c:"#40a8f0"},"weak-fair":{v:"⚪ 관망",a:"현금 유지",c:"#94a3b8"},"weak-rich":{v:"🔴 최강 발산",a:"방어 대기",c:"#f04060"}};
  const dStr=ens.score>=68?"strong":ens.score>=55?"mid":"weak";
  const vLv=ERP>1.5&&CAPE<33?"cheap":ERP>0&&CAPE<36?"fair":"rich";
  const conv=CMAP[dStr+"-"+vLv]||CMAP["mid-fair"];
  const el=liveTs?Math.floor((Date.now()-liveTs)/60000):null;
  const stale=el===null||el>60;
  const sc=el===null?"#f04060":el<10?"#10d090":el<30?"#f0a030":"#f04060";
  const sl=el===null?"미연결":el===0?"방금 전":el<60?el+"분 전":Math.floor(el/60)+"시간 전";

  React.useEffect(()=>{window.scrollTo(0,0);const t=setTimeout(()=>doLive(),2000);return()=>clearTimeout(t);},[]);

  async function doLive(){
    setLoading(true);setErr(null);
    try{const f=await fetchLive();const ts=new Date().toLocaleString("ko",{month:"numeric",day:"numeric",hour:"2-digit",minute:"2-digit"});f.updatedAt=ts+" 실시간";setD(p=>({...p,...f}));setLiveTs(Date.now());}
    catch(e){setErr("실시간 실패: "+e.message);}
    finally{setLoading(false);}
  }
  function doManual(){
    const u={};const s2=parseInt(mi.sp500),w=parseInt(mi.wti),v=parseFloat(mi.vix),r=parseFloat(mi.rate10);
    if(!isNaN(s2)&&s2>0)u.sp500=s2;if(!isNaN(w)&&w>0)u.wti=w;if(!isNaN(v)&&v>0)u.vix=v;if(!isNaN(r)&&r>0)u.rate10=r;
    if(!Object.keys(u).length)return;
    u.updatedAt=new Date().toLocaleString("ko",{month:"numeric",day:"numeric",hour:"2-digit",minute:"2-digit"})+" 수동";
    setD(p=>({...p,...u}));setLiveTs(Date.now());setShowMi(false);setMi({sp500:"",wti:"",vix:"",rate10:""});
  }

  // ── 렌더 ──
  const W={maxWidth:720,margin:"0 auto",padding:"12px 12px 80px",overflowX:"hidden"};
  return h("div",{style:W},
    // 헤더
    h("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:8}},
      h("div",null,
        h("div",{style:{fontSize:9,letterSpacing:".2em",color:C.t2,marginBottom:2}},
          "MARKET",h("span",{style:{color:"#10d090"}},"PULSE")," ",h("span",{style:{fontSize:8,color:C.t3}},"v8")),
        h("div",{style:{display:"flex",alignItems:"baseline",gap:7,margin:"2px 0"}},
          h("span",{style:{fontSize:22,fontWeight:900,color:stale?"#94a3b8":C.t1}},sp.toLocaleString()),
          h("span",{style:{fontSize:10,color:pct>0?"#10d090":"#f04060",fontWeight:700}},(pct>0?"+":"")+pct.toFixed(1)+"%"),
          h("span",{style:{fontSize:9,color:C.t3}},"평단 대비")),
        h("div",{style:{fontSize:9,color:sc,fontWeight:stale?700:400}},
          loading?"⏳ 수신 중...":stale?"⚠ "+sl+" — 업데이트 필요":"✅ "+sl+" · "+d.updatedAt)),
      h("div",{style:{display:"flex",flexDirection:"column",gap:4}},
        h("button",{onClick:doLive,disabled:loading,className:stale&&!loading?"stale":"",
          style:{padding:"8px 13px",fontSize:11,fontWeight:700,borderRadius:6,background:loading?C.bg4:stale?"linear-gradient(135deg,#f04060cc,#f04060)":"linear-gradient(135deg,#10d090cc,#10d090)",color:loading?C.t2:"#060a12",boxShadow:loading?"none":stale?"0 2px 12px rgba(240,64,96,.5)":"0 2px 12px rgba(16,208,144,.4)"}},
          loading?"⏳ 수신중…":stale?"🔴 업데이트":"📡 실시간 시세"),
        h("button",{onClick:()=>setShowMi(v=>!v),
          style:{padding:"7px 13px",fontSize:10,borderRadius:6,background:showMi?"rgba(64,168,240,.15)":C.bg3,color:showMi?"#40a8f0":C.t2,border:`1px solid ${showMi?"rgba(64,168,240,.35)":C.bg4}`}},
          "✏️ 수동입력"))),

    // 데이터 배너
    h("div",{onClick:stale?doLive:undefined,style:{background:stale?"rgba(240,64,96,.07)":"rgba(16,208,144,.04)",border:`1px solid ${stale?"rgba(240,64,96,.2)":"rgba(16,208,144,.15)"}`,borderLeft:`3px solid ${sc}`,padding:"7px 12px",marginBottom:err?6:10,borderRadius:"0 4px 4px 0",display:"flex",justifyContent:"space-between",alignItems:"center",cursor:stale?"pointer":"default"}},
      h("div",{style:{fontSize:9,color:sc,fontWeight:700}},stale?"⚠ 기본값 — 탭하여 갱신":"✅ 최신"),
      h("div",{style:{fontSize:8,color:C.t3}},"S&P "+sp.toLocaleString()+" · WTI $"+(d.wti||102)+" · VIX "+(d.vix||28.9)+" · 10Y "+(d.rate10||4.34)+"%")),

    // 에러
    err&&h("div",{style:{background:"rgba(240,80,96,.07)",borderLeft:"3px solid #f04060",padding:"7px 11px",fontSize:10,color:"#f04060",marginBottom:8,borderRadius:"0 4px 4px 0"}},
      "⚠ "+err,h("br"),h("span",{style:{fontSize:9,color:C.t2}},"💡 ✏️ 수동입력으로 직접 넣으세요")),

    // 수동 입력
    showMi&&h("div",{style:{background:C.bg2,border:"1px solid rgba(64,168,240,.2)",borderLeft:"3px solid #40a8f0",borderRadius:"0 6px 6px 0",padding:"12px 14px",marginBottom:10}},
      h("div",{style:{fontSize:10,fontWeight:700,color:"#40a8f0",marginBottom:10}},"✏️ 수동 입력"),
      h("div",{style:{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:10}},
        [["sp500","S&P500","6529"],["wti","WTI ($)","102"],["vix","VIX","28.9"],["rate10","10년물 (%)","4.34"]].map(([k,l,p])=>
          h("div",{key:k},
            h("div",{style:{fontSize:9,color:C.t3,marginBottom:4}},l),
            h("input",{type:"number",value:mi[k],placeholder:"예: "+p,onChange:e=>setMi(prev=>({...prev,[k]:e.target.value}))})))),
      h("div",{style:{display:"flex",gap:8}},
        h("button",{onClick:doManual,style:{flex:1,padding:9,fontSize:11,fontWeight:700,borderRadius:5,background:"linear-gradient(135deg,#40a8f0cc,#40a8f0)",color:"#060a12"}},"✓ 반영"),
        h("button",{onClick:()=>setShowMi(false),style:{padding:"9px 14px",fontSize:10,borderRadius:5,background:C.bg3,color:C.t2,border:`1px solid ${C.bg4}`}},"취소"))),

    // 앙상블 카드
    h("div",{className:ens.score>=68?"glow":"",style:{background:"linear-gradient(160deg,#0c1422,#0a1628)",borderRadius:8,padding:"14px 15px",marginBottom:10,border:`1px solid ${ens.color}28`,position:"relative",overflow:"hidden"}},
      h("div",{style:{position:"absolute",top:0,left:0,right:0,height:2,background:`linear-gradient(90deg,transparent,${ens.color},transparent)`}}),
      h("div",{style:{fontSize:9,letterSpacing:".1em",color:C.t3,textTransform:"uppercase",marginBottom:8}},"앙상블 신호 · 4분면50%+로지스틱30%+NFP20%"),
      h("div",{style:{display:"flex",alignItems:"center",gap:12,marginBottom:10}},
        h("div",{style:{fontSize:48,lineHeight:1}},ens.emoji),
        h("div",{style:{flex:1}},
          h("div",{style:{fontSize:24,fontWeight:900,color:ens.color,lineHeight:1.1}},ens.label),
          h("div",{style:{fontSize:10,color:C.t2,marginTop:3}},"→ ",h("b",{style:{color:ens.color}},ens.action))),
        h("div",{style:{textAlign:"right",flexShrink:0}},
          h("div",{style:{fontSize:34,fontWeight:900,color:ens.color,lineHeight:1}},ens.score),
          h("div",{style:{fontSize:8,color:C.t3,marginTop:1}},"/100점"))),
      h("div",{style:{position:"relative",height:7,background:C.bg4,borderRadius:4,overflow:"hidden",marginBottom:4}},
        [40,55,68,80].map(v=>h("div",{key:v,style:{position:"absolute",left:v+"%",top:0,bottom:0,width:1,background:"rgba(255,255,255,.15)"}})),
        h("div",{style:{height:"100%",width:ens.score+"%",borderRadius:4,background:`linear-gradient(90deg,${ens.color}44,${ens.color})`,transition:"width .8s",boxShadow:`0 0 6px ${ens.color}55`}})),
      h("div",{style:{display:"flex",justifyContent:"space-between",fontSize:8,color:C.t3,marginBottom:10}},
        ["방어","중립","조건부","적극","강력"].map(l=>h("span",{key:l},l))),
      h("div",{style:{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:4}},
        [{label:"4분면",sub:quad.cond,val:quad.upProb+"%",note:"WF 83%",c:qc},{label:"로지스틱",sub:"CPI+YC+HY+EPS",val:Math.round(LP*100)+"%",note:"WF 77%",c:"#a78bfa"},{label:"NFP콤보",sub:combo.label,val:combo.upProb+"%",note:combo.emoji,c:combo.color}].map(s=>
          h("div",{key:s.label,style:{background:C.bg3,borderRadius:4,padding:"7px 9px",borderLeft:`3px solid ${s.c}`}},
            h("div",{style:{fontSize:8,color:C.t3,marginBottom:1}},s.label),
            h("div",{style:{fontSize:9,color:s.c,fontWeight:700,marginBottom:1,overflow:"hidden",whiteSpace:"nowrap",textOverflow:"ellipsis"}},s.sub),
            h("div",{style:{fontSize:18,fontWeight:900,color:s.c,lineHeight:1.1}},s.val),
            h("div",{style:{fontSize:7,color:C.t3,marginTop:1}},s.note))))),
