/* ══ 실시간 API — Yahoo Finance (GitHub Pages에서 CORS 없음) ══ */
async function fetchLive(){
  const get=async sym=>{
    const r=await fetch(`https://query1.finance.yahoo.com/v8/finance/chart/${encodeURIComponent(sym)}?interval=1d&range=1d`,{signal:AbortSignal.timeout(7000)});
    if(!r.ok)throw new Error(r.status);
    const j=await r.json();
    return j?.chart?.result?.[0]?.meta?.regularMarketPrice??null;
  };
  const [sp,vx,wt,r10]=await Promise.all([get("^GSPC"),get("^VIX"),get("CL=F"),get("^TNX")]);
  const out={};
  if(sp)out.sp500=Math.round(sp);
  if(vx)out.vix=+vx.toFixed(1);
  if(wt)out.wti=Math.round(wt);
  if(r10)out.rate10=+r10.toFixed(2);
  if(!Object.keys(out).length)throw new Error("데이터 없음");
  return out;
}

async function fetchAI(){

  const j=await r.json();
  if(j.error)throw new Error(j.error.message);
  const txt=j.content.filter(b=>b.type==="text").map(b=>b.text).join("");
  const f=txt.indexOf("{"),l=txt.lastIndexOf("}");
  if(f<0||l<0)throw new Error("JSON 없음");
  return JSON.parse(txt.slice(f,l+1));
}

/* ══ ForecastTab ══ */
function ForecastTab({d,ens,quad,combo,logitP,qc,urChg}){
  const radar=[{axis:"CPI",val:Math.max(0,Math.min(100,(4-(d.cpi||2.7))/4*100))},{axis:"YC",val:Math.max(0,Math.min(100,((d.yc||.08)+.5)/2.5*100))},{axis:"HY",val:Math.max(0,Math.min(100,(8-(d.hy||3.5))/8*100))},{axis:"EPS",val:Math.max(0,Math.min(100,((d.eps||13)+10)/30*100))},{axis:"PMI",val:Math.max(0,Math.min(100,((d.pmi||49.5)-40)/25*100))},{axis:"NFP",val:Math.max(0,Math.min(100,combo.upProb))}];
  const briefLines=[
    "4분면: "+quad.cond+" → "+quad.upProb+"%(WF 83%). 로지스틱: "+Math.round(logitP*100)+"%(WF 77%). NFP콤보: "+combo.emoji+" "+combo.label+" "+combo.upProb+"%. → 앙상블 "+ens.score+"점.",
    quad.upProb>=69&&logitP>=0.55?"4분면·로지스틱 모두 상승 우위 — 방향 신호 긍정적. 밸류에이션·유가 리스크만 확인.":quad.upProb<=33||logitP<0.45?"방향 신호 약세 수렴 — 55점 이상 반전 전까지 대규모 집행 자제.":"방향 신호 혼재 — 다음 CPI·NFP 발표 후 재확인 필요.",
    combo.upProb<=42?"고용 약세("+combo.label+") — 침체 우려. 역발상 매수 관점 유지.":combo.upProb>=79?"고용 강세("+combo.label+") — 앙상블 최강 서포트. 다른 조건 충족 시 집행 유효.":"고용 보통 — 4/3 NFP 발표가 앙상블 방향 결정할 핵심.",
  ];

        <RadarChart data={radar}><PolarGrid stroke={C.bg4}/><PolarAngleAxis dataKey="axis" tick={{fill:C.t2,fontSize:10}}/><Radar dataKey="val" stroke={ens.color} fill={ens.color} fillOpacity={0.15} strokeWidth={2}/></RadarChart>
      </ResponsiveContainer>
    </div>
    <div style={{background:qc+"0d",border:`1px solid ${qc}35`,borderLeft:`4px solid ${qc}`,borderRadius:6,padding:14,marginBottom:10}}>
      <div style={{fontSize:9,color:C.t2,marginBottom:5}}>4분면 방향신호 · WF 83%</div>
      <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:8}}>
        <div style={{fontSize:48,fontWeight:900,color:qc,lineHeight:1}}>{quad.upProb}%</div>
        <div><div style={{fontSize:14,fontWeight:800,color:qc}}>{quad.cond}</div><div style={{fontSize:10,color:C.t2,marginTop:2}}>상승확률 · WF 83%</div></div>
      </div>
      <div style={{height:5,background:C.bg4,borderRadius:3,overflow:"hidden"}}><div style={{height:"100%",width:quad.upProb+"%",background:`linear-gradient(90deg,${qc}55,${qc})`,transition:"width .6s"}}/></div>
    </div>
    <div style={{background:"rgba(167,139,250,.06)",border:"1px solid rgba(167,139,250,.18)",borderLeft:"4px solid #a78bfa",borderRadius:6,padding:14,marginBottom:10}}>
      <div style={{fontSize:9,color:C.t2,marginBottom:5}}>로지스틱 회귀 · WF 77%</div>
      <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:10}}>
        <div style={{fontSize:48,fontWeight:900,color:"#a78bfa",lineHeight:1}}>{Math.round(logitP*100)}%</div>

          <div style={{display:"flex",justifyContent:"space-between"}}><span style={{fontSize:8,color:C.t3}}>기여</span><span style={{fontSize:11,fontWeight:800,color:cv>0?"#10d090":"#f04060"}}>{cv>0?"+":""}{item.contrib}</span></div>
        </div>;})}
      </div>
    </div>
    <div style={{background:`${combo.color}0d`,border:`1px solid ${combo.color}28`,borderLeft:`3px solid ${combo.color}`,borderRadius:4,padding:"12px 13px",marginBottom:12}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
        <div><div style={{display:"flex",alignItems:"center",gap:7,marginBottom:3}}><span style={{fontSize:20}}>{combo.emoji}</span><span style={{fontSize:14,fontWeight:800,color:combo.color}}>{combo.label}</span></div><div style={{fontSize:10,color:C.t2}}>NFP {d.nfp||14}만 / UR {urChg>0?"+":""}{urChg.toFixed(1)}%p</div></div>
        <div style={{textAlign:"right"}}><div style={{fontSize:26,fontWeight:900,color:combo.color}}>{combo.upProb}%</div><div style={{fontSize:9,color:C.t3}}>WF 74%</div></div>
      </div>
    </div>
    <Sec label="로지스틱 확률 추이"/>
    <div style={{background:C.bg2,padding:"10px 4px 8px",borderRadius:4}}>
      <ResponsiveContainer width="100%" height={200}>
        <ComposedChart data={HIST_Q} margin={{top:4,right:12,left:-22,bottom:0}}>
          <CartesianGrid stroke={C.bg4} strokeDasharray="3 3"/>
          <XAxis dataKey="q" tick={{fill:C.t3,fontSize:8}} tickLine={false} interval={3}/>
          <YAxis yAxisId="l" domain={[2000,7500]} tick={{fill:C.t2,fontSize:8}} tickLine={false} tickFormatter={v=>(v/1000).toFixed(1)+"k"}/>
          <YAxis yAxisId="r" orientation="right" domain={[40,100]} tick={{fill:"#a78bfa",fontSize:8}} tickLine={false} tickFormatter={v=>v+"%"}/>
          <Tooltip content={<TTip/>}/>
          <ReferenceLine yAxisId="r" y={55} stroke="rgba(255,255,255,.08)" strokeDasharray="4 3"/>
          <ReferenceLine yAxisId="l" x="26Q1" stroke={ens.color+"50"} strokeDasharray="4 3" label={{value:"현재",fill:ens.color,fontSize:8,position:"insideTopRight"}}/>
          <Line yAxisId="l" type="monotone" dataKey="실제" name="S&P500" stroke="#e2e8f0" strokeWidth={2} dot={false} connectNulls/>
          <Line yAxisId="r" type="monotone" dataKey="logit" name="로지스틱%" stroke="#a78bfa" strokeWidth={2} strokeDasharray="5 2" dot={false} connectNulls/>
        </ComposedChart>
      </ResponsiveContainer>
    </div>
  </div>;
}

/* ══ ModelTab ══ */
function ModelTab({d,ens,quad,combo,logitP,qc}){
  const [sub,setSub]=useState("perband");
  const fwdEPS=d.fwdEps||320,curSPv=d.sp500||6529,curRate=d.rate10||4.34,curCPI=d.cpi||2.7;
  const implPE=+(curSPv/fwdEPS).toFixed(1);
  const cb=calcBand(fwdEPS,curRate);
  const disc=Math.round((curSPv/cb.fairVal-1)*100);
  const curWTI=d.wti||102;
  const cpi1=predictCPI(curWTI,curCPI),cpi2=predictCPI(curWTI,cpi1),cpi3=predictCPI(curWTI,cpi2);
  const appPE=d.pe||19.4,appCape=d.cape||35.5;
  const appEY=+(100/appPE).toFixed(2);
  const appErp=+(appEY-curRate).toFixed(2);
  const realErp=+(appEY-curCPI).toFixed(2);
  const appReg=detectRegime(d,appErp,appCape);
  const wtiColor=curWTI>=100?"#f04060":curWTI>=85?"#f59e0b":curWTI>=70?"#f0a030":"#10d090";
  const bandData=[...BAND_Q,{q:"26Q1",sp500:curSPv,eps:fwdEPS,rate:curRate}].map(r=>({...r,...calcBand(r.eps,r.rate)}));

  const briefs={
    perband:["현재 S&P "+curSPv.toLocaleString()+" / implied PE "+implPE+"x. 금리 기반 적정가 "+cb.fairVal.toLocaleString()+" 대비 +"+(disc)+"% 프리미엄. 22x 밴드 "+cb.b22.toLocaleString()+".",
      "실질수익률(EY-CPI) 기반 적정가 "+(Math.round((100/(5+curCPI))*fwdEPS)).toLocaleString()+" — 현재 대비 +"+(Math.round((curSPv/Math.round((100/(5+curCPI))*fwdEPS)-1)*100))+"% 고평가. WTI 상승으로 CPI 재가속 시 적정가 추가 하락.",
      "EPS 성장 "+d.eps+"%가 PE 프리미엄 정당화의 핵심. 어닝 서프라이즈 지속 시 22~26x 유지 가능, 실망 시 18x("+cb.b18.toLocaleString()+") 지지선 테스트."],
    wti:["WTI $"+curWTI+" — $80 기준선 $"+(curWTI-80)+" 위. $80 이하 구간 S&P 4Q 기대수익률 +29.5%, 이상은 +1.5%.",
      "유가→CPI 선행: 현재 "+curCPI+"% → 1Q 후 "+cpi1+"% 예상. "+(cpi1>=3.5?"⚠ 3.5% 재가속 경계 돌파 — 연준 인상 가능성 부각.":"현 수준 유지 시 CPI 안정 가능."),
      "WTI↑ → CPI↑ → 연준 동결 → ERP 하락 → 적정가 하향. $90 이하로 내려올 때까지 대규모 집행 자제."],
    advanced:["ERP "+(appErp>0?"+":"")+appErp+"% — "+(appErp>1.5?"주식이 채권보다 유리":appErp>0?"거의 중립":appErp>-1?"채권이 주식보다 유리":"채권 압도적 우위")+". CAPE "+appCape+"x는 역사 평균 17x의 2배 이상.",
      (()=>{const reg=detectRegime(d,appErp,appCape);return "레짐: "+reg.label+" — "+(reg.label==="전환 구간"?"방향성 불확실. 분할매수 유지.":reg.score>=3?"복수 지표 강세. 조건 충족 시 집행 유효.":"약세 신호 우세. 방어 기조 유지.");})(),
      "WTI $"+curWTI+" 환경 → 실질 ERP "+realErp+"%. 유가 $80 이하 시 CPI 안정 → ERP 개선 → 매수 환경 급격 호전."],
    ensemble:["현재 "+ens.score+"점("+ens.label+") — 4분면 "+quad.upProb+"%×50% + 로지스틱 "+Math.round(logitP*100)+"%×30% + NFP "+combo.upProb+"%×20%.",
      "WTI $"+curWTI+" 지속 시 CPI "+cpi2+"% → 앙상블 최대 "+(Math.round((cpi2-curCPI)*3))+"점 하락 가능. 55점 이상 유지 여부가 집행 관건.",
      "4/3 NFP·4/10 CPI 발표 결과가 앙상블 방향 결정. 골디락스 조합 시 +10~15점, 침체 강화 시 -8~12점 예상."],
  };

  const TABS=[["perband","📊 PER밴드"],["wti","🛢 유가-물가"],["advanced","📡 고급지표"],["ensemble","앙상블"]];
  return <div className="fade">
    <Brief lines={briefs[sub]||briefs.perband} color="#40a8f0" emoji="🔬"/>
    <div style={{display:"flex",background:C.bg2,marginBottom:12,borderRadius:4,overflow:"hidden",border:`1px solid ${C.bg4}`}}>
      {TABS.map(([v,l])=><button key={v} onClick={()=>setSub(v)} style={{flex:1,padding:"8px 2px",fontSize:9,fontWeight:sub===v?700:400,background:sub===v?C.bg3:C.bg2,color:sub===v?C.t1:C.t2,border:"none",borderBottom:sub===v?"2px solid #40a8f0":"2px solid transparent",transition:"all .15s"}}>{l}</button>)}
    </div>
    {sub==="perband"&&<div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr 1fr",gap:4,marginBottom:10}}>
        <KV label="현재 S&P" value={curSPv.toLocaleString()} color={C.t1}/>
        <KV label="선행 EPS" value={"$"+fwdEPS} color="#40a8f0"/>
        <KV label="현재 PE" value={implPE+"x"} color={implPE>26?"#f04060":implPE>22?"#f0a030":"#10d090"}/>

    const ts=new Date().toLocaleString("ko",{month:"numeric",day:"numeric",hour:"2-digit",minute:"2-digit"});
    upd.updatedAt=ts+" 수동입력";
    setD(p=>({...p,...upd}));
    setLiveTs(Date.now());
    setShowManual(false);setMi({sp500:"",wti:"",vix:"",rate10:""});setError(null);
  };

  const nav=on=>({flex:1,padding:"9px 4px",fontSize:10,fontWeight:on?700:400,background:on?C.bg3:C.bg2,color:on?C.t1:C.t2,border:"none",borderBottom:on?"2px solid "+ens.color:"2px solid transparent",borderTop:"2px solid transparent",cursor:"pointer",transition:"all .15s"});

  return <div style={{fontFamily:"-apple-system,'SF Pro Display',sans-serif",background:C.bg,color:C.t1,minHeight:"100vh",padding:"12px 12px 80px",maxWidth:720,margin:"0 auto"}}>

    {/* 헤더 */}
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:8}}>
      <div>
        <div style={{fontSize:9,letterSpacing:".2em",color:C.t2,textTransform:"uppercase",lineHeight:1.8}}>MARKET<span style={{color:"#10d090"}}>PULSE</span> <span style={{fontSize:8,color:C.t3}}>v8</span></div>
        <div style={{display:"flex",alignItems:"baseline",gap:7,margin:"2px 0"}}>
          <span style={{fontSize:22,fontWeight:900,color:isStale?"#94a3b8":C.t1,letterSpacing:"-0.5px"}}>{curSP.toLocaleString()}</span>
          <span style={{fontSize:10,color:pct>0?"#10d090":"#f04060",fontWeight:700}}>{pct>0?"+":""}{pct.toFixed(1)}%</span>
          <span style={{fontSize:9,color:C.t3}}>평단 대비</span>
        </div>
        <div style={{fontSize:9,color:staleColor,fontWeight:isStale?700:400}}>
          {loadingLive?"⏳ 시세 수신 중...":loadingAI?"⏳ AI 분석 중...":isStale?"⚠ "+staleLabel+" — 업데이트 필요":"✅ "+staleLabel+" · "+d.updatedAt}
        </div>
      </div>
      <div style={{display:"flex",flexDirection:"column",gap:4,flexShrink:0}}>
        <button onClick={handleLive} disabled={loadingLive||loadingAI} className={isStale&&!loadingLive?"stale-btn":""}
          style={{padding:"8px 13px",fontSize:11,fontWeight:700,borderRadius:6,background:loadingLive?C.bg4:isStale?"linear-gradient(135deg,rgba(240,64,96,.9),#f04060)":"linear-gradient(135deg,rgba(16,208,144,.9),#10d090)",color:loadingLive?C.t2:"#060a12",border:"none",boxShadow:loadingLive?"none":isStale?"0 2px 10px rgba(240,64,96,.4)":"0 2px 10px rgba(16,208,144,.4)"}}>
          {loadingLive?"⏳ 수신중…":isStale?"🔴 업데이트":"📡 실시간 시세"}
        </button>
        <button onClick={handleAI} disabled={loadingAI||loadingLive}
          style={{padding:"7px 13px",fontSize:10,fontWeight:500,borderRadius:6,background:loadingAI?C.bg4:C.bg3,color:C.t2,border:`1px solid ${C.bg4}`}}>
          {loadingAI?"⏳ AI중…":"⚡ AI 뉴스·거시"}
        </button>
        <button onClick={()=>setShowManual(v=>!v)}
          style={{padding:"6px 13px",fontSize:10,fontWeight:500,borderRadius:6,background:showManual?"rgba(64,168,240,.15)":C.bg3,color:showManual?"#40a8f0":C.t2,border:`1px solid ${showManual?"rgba(64,168,240,.35)":C.bg4}`}}>
          ✏️ 수동입력
        </button>
      </div>
    </div>

    {/* 데이터 배너 */}
    <div onClick={isStale?handleLive:undefined} style={{background:isStale?"rgba(240,64,96,.07)":"rgba(16,208,144,.04)",border:`1px solid ${isStale?"rgba(240,64,96,.2)":"rgba(16,208,144,.15)"}`,borderLeft:`3px solid ${staleColor}`,padding:"7px 12px",marginBottom:8,borderRadius:"0 4px 4px 0",display:"flex",justifyContent:"space-between",alignItems:"center",cursor:isStale?"pointer":"default"}}>
      <div style={{fontSize:9,fontWeight:isStale?700:400,color:staleColor}}>{isStale?"⚠ 기본값 사용 중 — 탭하여 갱신":"✅ 최신 데이터"}</div>
      <div style={{fontSize:8,color:C.t3}}>S&P {curSP.toLocaleString()} · WTI ${d.wti||102} · VIX {d.vix||28.9} · 10Y {d.rate10||4.34}%</div>
    </div>

    {/* 에러 */}
    {error&&<div style={{background:"rgba(240,80,96,.07)",borderLeft:"3px solid #f04060",padding:"7px 11px",fontSize:10,color:"#f04060",marginBottom:8,borderRadius:"0 4px 4px 0"}}>
      ⚠ {error}<br/><span style={{fontSize:9,color:C.t2}}>💡 API 실패 시 ✏️ 수동입력으로 직접 넣으세요</span>
    </div>}

    {/* 수동 입력 패널 */}
    {showManual&&<div style={{background:C.bg2,border:"1px solid rgba(64,168,240,.2)",borderLeft:"3px solid #40a8f0",borderRadius:"0 6px 6px 0",padding:"12px 14px",marginBottom:10}}>
      <div style={{fontSize:10,fontWeight:700,color:"#40a8f0",marginBottom:10}}>✏️ 수동 입력 — 빈 칸은 기존값 유지</div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:10}}>
        {[{k:"sp500",l:"S&P500",p:"예: 6529"},{k:"wti",l:"WTI ($)",p:"예: 102"},{k:"vix",l:"VIX",p:"예: 28.9"},{k:"rate10",l:"10년물 (%)",p:"예: 4.34"}].map(f=><div key={f.k}>
          <div style={{fontSize:9,color:C.t3,marginBottom:4}}>{f.l}</div>
          <input type="number" value={mi[f.k]} onChange={e=>setMi(p=>({...p,[f.k]:e.target.value}))} placeholder={f.p}/>
        </div>)}
      </div>
      <div style={{display:"flex",gap:8}}>
        <button onClick={handleManual} style={{flex:1,padding:9,fontSize:11,fontWeight:700,borderRadius:5,background:"linear-gradient(135deg,rgba(64,168,240,.9),#40a8f0)",color:"#060a12",border:"none"}}>✓ 반영하기</button>
        <button onClick={()=>setShowManual(false)} style={{padding:"9px 14px",fontSize:10,borderRadius:5,background:C.bg3,color:C.t2,border:`1px solid ${C.bg4}`}}>취소</button>
      </div>
    </div>}

    {/* 앙상블 카드 */}
    <div style={{background:"linear-gradient(160deg,#0c1422,#0a1628)",borderRadius:8,padding:"14px 15px",marginBottom:10,border:`1px solid ${ens.color}28`,position:"relative",overflow:"hidden"}} className={ens.score>=68?"glow":""}>
      <div style={{position:"absolute",top:0,left:0,right:0,height:2,background:`linear-gradient(90deg,transparent,${ens.color},transparent)`}}/>
      <div style={{fontSize:9,letterSpacing:".1em",color:C.t3,textTransform:"uppercase",marginBottom:8}}>앙상블 신호 · 4분면50%+로지스틱30%+NFP20%</div>
      <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:10}}>
        <div style={{fontSize:48,lineHeight:1}}>{ens.emoji}</div>
        <div style={{flex:1}}><div style={{fontSize:24,fontWeight:900,color:ens.color,lineHeight:1.1}}>{ens.label}</div><div style={{fontSize:10,color:C.t2,marginTop:3}}>→ <b style={{color:ens.color}}>{ens.action}</b></div></div>
        <div style={{textAlign:"right",flexShrink:0}}><div style={{fontSize:34,fontWeight:900,color:ens.color,lineHeight:1}}>{ens.score}</div><div style={{fontSize:8,color:C.t3,marginTop:1}}>/ 100점</div></div>
      </div>
      <div style={{position:"relative",height:7,background:C.bg4,borderRadius:4,overflow:"hidden",marginBottom:4}}>
        {[40,55,68,80].map(v=><div key={v} style={{position:"absolute",left:v+"%",top:0,bottom:0,width:1,background:"rgba(255,255,255,.15)"}}/>)}
        <div style={{height:"100%",width:ens.score+"%",borderRadius:4,background:`linear-gradient(90deg,${ens.color}44,${ens.color})`,transition:"width .8s ease",boxShadow:`0 0 6px ${ens.color}55`}}/>
      </div>
      <div style={{display:"flex",justifyContent:"space-between",fontSize:8,color:C.t3,marginBottom:10}}>
        {["방어","중립","조건부","적극","강력"].map(l=><span key={l}>{l}</span>)}
      </div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:4}}>
        {[{label:"4분면",sub:quad.cond,val:quad.upProb+"%",note:"WF 83%",c:qc},{label:"로지스틱",sub:"CPI+YC+HY+EPS",val:Math.round(lp*100)+"%",note:"WF 77%",c:"#a78bfa"},{label:"NFP콤보",sub:combo.label,val:combo.upProb+"%",note:combo.emoji,c:combo.color}].map(s=><div key={s.label} style={{background:C.bg3,borderRadius:4,padding:"7px 9px",borderLeft:`3px solid ${s.c}`}}>
          <div style={{fontSize:8,color:C.t3,marginBottom:1}}>{s.label}</div>
          <div style={{fontSize:9,color:s.c,fontWeight:700,marginBottom:1,overflow:"hidden",whiteSpace:"nowrap",textOverflow:"ellipsis"}}>{s.sub}</div>
          <div style={{fontSize:18,fontWeight:900,color:s.c,lineHeight:1.1}}>{s.val}</div>
          <div style={{fontSize:7,color:C.t3,marginTop:1}}>{s.note}</div>
        </div>)}
      </div>
    </div>

    {/* 수렴 패널 */}
    <div style={{background:`linear-gradient(135deg,${conv.c}0a,${C.bg2})`,border:`1px solid ${conv.c}25`,borderRadius:8,padding:"12px 14px",marginBottom:10,position:"relative",overflow:"hidden"}}>
      <div style={{position:"absolute",top:0,left:0,right:0,height:2,background:`linear-gradient(90deg,transparent,${conv.c},transparent)`}}/>
      <div style={{fontSize:8,letterSpacing:".1em",color:C.t3,textTransform:"uppercase",marginBottom:7}}>통합 확신도 · 앙상블+ERP+CAPE+레짐</div>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
        <div><div style={{fontSize:13,fontWeight:800,color:conv.c,marginBottom:2}}>{conv.v}</div><div style={{fontSize:9,color:C.t2}}>{conv.a}</div></div>
        <div style={{textAlign:"right"}}><div style={{fontSize:30,fontWeight:900,color:conv.c,lineHeight:1}}>{intScore}</div><div style={{fontSize:8,color:C.t3}}>/ 100점</div></div>
      </div>
      <div style={{position:"relative",height:6,background:C.bg4,borderRadius:3,overflow:"hidden",marginBottom:4}}>
        {[40,55,68,80].map(v=><div key={v} style={{position:"absolute",left:v+"%",top:0,bottom:0,width:1,background:"rgba(255,255,255,.15)"}}/>)}
        <div style={{position:"absolute",left:ens.score+"%",top:0,bottom:0,width:2,background:"rgba(255,255,255,.4)",transform:"translateX(-1px)"}}/>
        <div style={{height:"100%",width:intScore+"%",background:`linear-gradient(90deg,${conv.c}44,${conv.c})`,borderRadius:3,transition:"width .8s ease"}}/>
      </div>
      <div style={{display:"flex",justifyContent:"space-between",fontSize:8,color:C.t3,marginBottom:8}}>
        <span>앙상블 {ens.score}점</span><span style={{color:conv.c,fontWeight:700}}>→ {conv.a}</span><span>통합 {intScore}점</span>
      </div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr 1fr",gap:4}}>
        {[{l:"앙상블",v:ens.score,c:ens.color},{l:"ERP "+(appErp>0?"+":"")+appErp+"%",v:(erpAdj>0?"+":"")+erpAdj,c:appErp>0?"#10d090":"#f04060"},{l:"CAPE "+appCape+"x",v:(capeAdj>0?"+":"")+capeAdj,c:appCape<30?"#10d090":appCape<36?"#f0a030":"#f04060"},{l:"레짐 "+(appReg.score>0?"+":"")+appReg.score,v:(regAdj>0?"+":"")+regAdj,c:appReg.color}].map((x,i)=><div key={i} style={{background:C.bg4,borderRadius:3,padding:"5px 7px",textAlign:"center"}}>
          <div style={{fontSize:7,color:C.t3,marginBottom:2}}>{x.l}</div>
          <div style={{fontSize:11,fontWeight:800,color:x.c}}>{i===0?x.v:x.v+"보정"}</div>
        </div>)}
      </div>
    </div>

    {/* 탭 */}
    <div style={{display:"flex",background:C.bg2,marginBottom:14,borderRadius:4,overflow:"hidden",border:`1px solid ${C.bg4}`}}>
      {[["today","① 오늘"],["forecast","② 방향"],["model","③ 모델"]].map(([v,l])=><button key={v} onClick={()=>setView(v)} style={nav(view===v)}>{l}</button>)}
    </div>
    {view==="today"   &&<TodayTab d={d} ens={ens} combo={combo} curSP={curSP} urChg={urChg}/>}
    {view==="forecast"&&<ForecastTab d={d} ens={ens} quad={quad} combo={combo} logitP={lp} qc={qc} urChg={urChg}/>}
    {view==="model"   &&<ModelTab d={d} ens={ens} quad={quad} combo={combo} logitP={lp} qc={qc}/>}

    <div style={{fontSize:8,color:C.t3,textAlign:"center",marginTop:20,lineHeight:1.8}}>MARKETPULSE v8 · 투자 참고용 · WF 77~83%</div>
  </div>;
}

const root=ReactDOM.createRoot(document.getElementById("root"));
root.render(<App/>);
document.getElementById('loading')?.remove();
</script>
</body>
</html>
